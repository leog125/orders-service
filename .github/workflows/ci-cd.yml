name: CI/CD OrdersService

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: docker.io/${{ secrets.REGISTRY_USER }}/orders-service

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DEPLOY_REPO }}
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy-repo

      - name: Update Helm values and push
        run: |
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" deploy-repo/charts/orders-service/values-prod.yaml
          cd deploy-repo
          git config user.name "ci-bot"
          git config user.email "ci-bot@ci.local"
          git add charts/orders-service/values-prod.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
